<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espera | Dashboard</title>

    <!-- 1. Fix CSP (Security) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://identity.netlify.com https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https://*.openstreetmap.org https://*.tile.openstreetmap.org;">

    <!-- 2. Fix Favicon 404 -->
    <link rel="icon" href="data:,">

    <!-- 3. Preload Font to fix "Slow Network" warning -->
    <link rel="preload" href="https://fonts.gstatic.com/s/materialsymbolsrounded/v334/sykg-zNym6YjUruM-QrEh7-nyTnjDwKNJ_190Fjzag.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.0.0/ol.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root {
            --bg-dark: #09090b;
            --sidebar-bg: #111114;
            --card-bg: #18181b;
            --accent: #6366f1;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(18, 18, 21, 0.8);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 400px;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid var(--border);
        }

        /* LAYOUT */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            padding: 20px 0;
        }

        .sidebar-header { padding: 0 24px 30px; font-weight: 800; font-size: 20px; }

        .menu-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-muted); }
        .menu-item.active { color: var(--text-main); background: rgba(99, 102, 241, 0.1); }

        .main-container { flex: 1; display: flex; flex-direction: column; }

        .dashboard-header {
            display: flex;
            height: 90px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 30px;
            align-items: center;
            justify-content: space-between;
        }

        .content-body { flex: 1; display: flex; position: relative; }

        /* CRITICAL: Ensure map container has size */
        #map { 
            position: absolute;
            inset: 0;
            background: #0e0e11; 
        }

        .history-panel {
            width: 340px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            padding: 20px;
            z-index: 5;
        }

        .btn-locate {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center; gap: 8px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 class="tr" data-fr="Connexion" data-en="Sign In">Connexion</h2>
            <p class="tr" style="color:var(--text-muted); margin-bottom:30px;" data-fr="Accédez à votre tableau de bord." data-en="Access your dashboard.">Accédez à votre tableau de bord.</p>
            <button onclick="netlifyIdentity.open()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;">
                Login / Continuer
            </button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">ESPERA</div>
        <div class="menu-item active">
            <span class="material-symbols-rounded">grid_view</span>
            <span>Dashboard</span>
        </div>
        <div class="menu-item" onclick="netlifyIdentity.logout()">
            <span class="material-symbols-rounded">logout</span>
            <span>Logout</span>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-container">
        <div class="dashboard-header">
            <div>
                <h1 style="margin:0; font-size:18px;">Tracking</h1>
                <div style="font-size:12px; color:var(--text-muted);" id="current-address">Ready</div>
            </div>
            <button class="btn-locate" onclick="locateDevice()">
                <span class="material-symbols-rounded">my_location</span> Localiser
            </button>
        </div>
        <div class="content-body">
            <div id="map"></div>
            <div class="history-panel">
                <div style="color:var(--text-muted); text-align:center; margin-top:50px;">History Empty</div>
            </div>
        </div>
    </div>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.0.0/dist/ol.js"></script>
    
    <script>
        let map;

        function initMap() {
            if (!map) {
                map = new ol.Map({
                    target: 'map',
                    layers: [new ol.layer.Tile({ source: new ol.source.OSM() })],
                    view: new ol.View({ center: ol.proj.fromLonLat([10.18, 36.80]), zoom: 6 })
                });
                console.log("Map successfully rendered.");
            }
        }

        function startApp() {
            document.getElementById('login-overlay').classList.add('hidden');
            setTimeout(initMap, 100);
        }

        window.onload = () => {
            netlifyIdentity.init();
            if (netlifyIdentity.currentUser()) {
                startApp();
            }
        };

        netlifyIdentity.on('login', () => {
            netlifyIdentity.close();
            startApp();
        });

        netlifyIdentity.on('logout', () => location.reload());

        async function locateDevice() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lonlat = [pos.coords.longitude, pos.coords.latitude];
                    map.getView().animate({ center: ol.proj.fromLonLat(lonlat), zoom: 16 });
                });
            }
        }
    </script>
</body>
</html>
